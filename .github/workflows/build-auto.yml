name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
    - name: Install dependencies
      # 使用 --ignore-scripts 跳过 scratch-vm 的 prepublish（下载 microbit 固件经常超时）
      run: npm ci --ignore-scripts
    - name: Install Electron binary
      # electron 的 postinstall 下载二进制文件，必须单独运行
      run: cd node_modules/electron && node install.js
    - name: Prepare extensions
      # Don't need to do a full fetch, that would just cause a lot of unnecessary traffic
      run: node scripts/prepare-extensions.mjs
    - name: Compile
      run: npm run webpack:compile
    - name: Package
      run: npm run electron:package:dir
